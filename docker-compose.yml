services:
  backend:
    build:
      context: ./backend
    container_name: demo_showcase_backend
    restart: unless-stopped
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123!
      ADMIN_JWT_SECRET: change-this-secret-in-production
      ADMIN_TOKEN_EXPIRE_HOURS: 12
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: demo_showcase_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  demo_data:
    driver: local
