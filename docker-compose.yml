services:
  backend:
    build:
      context: ./backend
    image: cuzub/bpk-demo-backend
    container_name: bpk-demo-backend
    restart: unless-stopped
    environment:
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123!
      ADMIN_JWT_SECRET: change-this-secret-in-production
      ADMIN_TOKEN_EXPIRE_HOURS: 12
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    image: cuzub/bpk-demo-frontend
    container_name: bpk-demo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

